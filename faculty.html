<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Simple Attendance (Minimal JS)</title>
<style>
body{
    margin:0;
    padding:20px;
    min-height:100vh;
    background-image:url('Background.jpg');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
    font-family:'Poppins',sans-serif;
}

select{
    width:250px;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:12px;
    outline:none;
    background:rgba(255,255,255,0.9);
}

.box{
    max-width:900px;
    margin:auto;
    padding:30px;
    border-radius:25px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    -webkit-backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.3);
    box-shadow:0 8px 32px rgba(0,0,0,0.25);
}

h2{
    text-align:center;
    color:white;
    margin-bottom:25px;
    font-size:32px;
    text-shadow:2px 2px 5px rgba(0,0,0,0.3);
}

h3{
    color:white;
    margin-top:25px;
    margin-bottom:15px;
}

label{
    color:white;
    font-weight:bold;
}

input[type="text"],
input[type="date"]{
    width:250px;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:12px;
    outline:none;
    background:rgba(255,255,255,0.9);
}

.summary-box input{
    width:220px;
    margin-bottom:10px;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
    overflow:hidden;
    border-radius:15px;
    background:white;
}

thead{
    background:linear-gradient(135deg,#4f46e5,#06b6d4);
    color:white;
}

th{
    padding:15px;
    text-align:center;
}

td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

tbody tr:nth-child(even){
    background:#f7f7f7;
}

tbody tr:hover{
    background:#e0f2fe;
    transition:0.3s;
}

.pr{
    width:18px;
    height:18px;
    cursor:pointer;
}

button{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#4f46e5,#06b6d4);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 6px 15px rgba(0,0,0,0.25);
}

b{
    color:white;
}

@media(max-width:768px){

    .box{
        padding:15px;
    }

    table{
        font-size:14px;
    }

    input[type="text"],
    input[type="date"]{
        width:100%;
    }

    .summary-box input{
        width:100%;
    }
}
</style>
</head>
<body>

<div class="box">
<h2>Student Attendance Tracker</h2>

<label>Date: </label>
<input type="date" id="attendanceDate"><br>

<label>Subject :</label>

<select id="attendanceSubject">
    <option value="">Select Subject</option>
    <option value="C Programming">C Programming</option>
    <option value="Mathematics">Mathematics</option>
    <option value="Computer Fundamentals">Computer Fundamentals</option>
    <option value="Communication Skills">Communication Skills</option>
    <option value="Web Designing">Web Designing</option>
</select>


<table>
<thead>
<tr><th>No</th><th>Name</th><th>Present</th></tr>
</thead>
<tbody id="list"></tbody>
</table>

<h3>Today Attendance Summary</h3>
<div class="summary-box">
    <input id="tp" placeholder="Total Present" readonly> <b>: Total Present</b><br>
    <input id="ta" placeholder="Total Absent" readonly> <b>: Total Absent</b><br>
    <input id="per" placeholder="Percentage (%)" readonly> <b>: Percentage</b> <br>
    <button onclick="saveData()">Submit</button> <br>

<button class="delete-btn" onclick="deleteAttendance()">
    Delete Previous Attendance
</button>
</div>

</div>

<script>

// ---- Predefined Student List (Yaha apne class ke naam add karo) ----
let studentNames = [
    "Prajapati Urvish",
    "Aasodiya Dvij",
    "Nayak Jay",
    "Patel Om",
    "Barot Aryan",
    "Rabari Parth",
    "Rabari Minnat",
    "Raval Jayesh",
    "Raval Hitesh",
    "Raval Dipen",
    "Thakor Hardik",
    "Prajapati Harshit",
    "Makwana Jaydeep",
    "Patel Preet",
    "Prajapati Deversh",
    "Dabhi Vishal",
    "Pathan Aspak",
    "Ubhodiya Anshuman",
    "Choudhary Jay",
    "Darji Shubham",
    "Solanki Chirag",
    "Solanki Siddhraj",
];

// Page load hote hi names show ho jayenge
window.onload = function() {
    loadStudents();
};

// Table me names fill karo
function loadStudents() {
    let table = document.getElementById('list');
    table.innerHTML = ""; 

    studentNames.forEach((name, index) => {
        let row = document.createElement('tr');

        row.innerHTML = `
            <td>${index + 1}</td>
            <td>${name}</td>
            <td><input type='checkbox' class='pr'></td>
        `;

        table.appendChild(row);
    });

    calculate();
}

// Present/Absent & Percentage calculate
function calculate(){
    let checks=document.querySelectorAll('.pr');
    let total=checks.length;
    let present=0;

    checks.forEach(c=>{ 
        if(c.checked) present++; 
    });

    let absent = total - present;
    let per = total > 0 ? ((present/total)*100).toFixed(2) : 0;

    document.getElementById('tp').value = present;
    document.getElementById('ta').value = absent;
    document.getElementById('per').value = per + ' %';
}

// radio click par calculate chalega
document.addEventListener('click', function(e){
    if(e.target.classList.contains('pr')){
        calculate();
    }
});

// Save Data localStorage me
function saveData() {

    let subject =
    document.getElementById("attendanceSubject").value;

    let date =
    document.getElementById("attendanceDate").value;

    if(subject === ""){
        alert("Please Select Subject");
        return;
    }

    if(date === ""){
        alert("Please Select Date");
        return;
    }

    let attendance = [];

    document.querySelectorAll(".pr").forEach(box => {

        attendance.push(
            box.checked ? "P" : "A"
        );

    });

    let history =
    JSON.parse(
        localStorage.getItem("attendanceHistory")
    ) || [];

    // Same subject + same date duplicate check
    let alreadyExists =
    history.some(record =>
        record.subject === subject &&
        record.date === date
    );

    if(alreadyExists){
        alert(
            subject +
            " attendance for " +
            date +
            " already exists!"
        );
        return;
    }

    history.push({
        date: date,
        subject: subject,
        attendance: attendance
    });

    localStorage.setItem(
        "attendanceHistory",
        JSON.stringify(history)
    );

    localStorage.setItem(
        "attendance_date",
        date
    );

    alert(
        subject +
        " attendance saved successfully!"
    );
}

function deleteAttendance(){

    let confirmDelete = confirm(
        "Are you sure you want to delete all attendance data?"
    );

    if(confirmDelete){

        localStorage.removeItem("attendanceHistory");
        localStorage.removeItem("allAttendance");
        localStorage.removeItem("attendance_data");
        localStorage.removeItem("attendance_date");
        localStorage.removeItem("attendance_subject");
        localStorage.removeItem("attendance_time");

        alert("All Attendance Deleted Successfully!");

    }

}
</script>

</body>
</html>
